version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: '3000'
      NODE_ENV: 'production'
      REDIS_URL: 'redis://redis:6379'
      TURNSTILE_SECRET_KEY: '${TURNSTILE_SECRET_KEY:-}'
    volumes:
      - image_converter_tmp:/tmp/image-converter
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save ""
      --appendonly no
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/image-converter:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - external
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

volumes:
  image_converter_tmp:
    driver: local

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
